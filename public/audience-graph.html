<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audience Graph — Targeting Blueprint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="/data/audience-graph-scores.js"></script>
  <script src="/data/channel-affinity-scores.js"></script>
  <script src="/data/keyword-clusters.js"></script>
  <script src="/data/daypart-profiles.js"></script>
  <style>
    .pill { transition: all .15s ease; user-select: none; }
    .pill:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .pill.active { transform: translateY(0); }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    .score-cell { cursor: pointer; transition: background .15s ease; }
    .score-cell:hover { background: #f0f9ff; }
    #cy { height: 500px; }
    .tag { transition: all .15s ease; }
    .tag:hover { filter: brightness(0.95); }
    .bar-fill { transition: width .4s ease; }
    .matrix-input { width: 28px; text-align: center; border: 1px solid transparent; border-radius: 4px; background: transparent; font-size: 13px; font-weight: 600; }
    .matrix-input:hover { border-color: #93c5fd; background: #eff6ff; }
    .matrix-input:focus { outline: none; border-color: #3b82f6; background: #eff6ff; }
    /* Drill-down panel */
    .drilldown-panel { animation: fadeIn .3s ease; }
    .drilldown-close { position: absolute; top: 16px; right: 16px; }
    .affinity-bar { transition: width .4s ease; height: 28px; border-radius: 4px; }
    .scatter-canvas { max-height: 340px; }
    .kw-cluster-block { cursor: pointer; border-radius: 8px; padding: 12px; transition: all .15s ease; }
    .kw-cluster-block:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .kw-table th { cursor: pointer; user-select: none; }
    .kw-table th:hover { background: #f0f9ff; }
    .daypart-card { border-radius: 8px; padding: 16px; text-align: center; }
    .dow-block { border-radius: 6px; padding: 8px 4px; text-align: center; font-size: 12px; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ═══════════════════ A. HEADER ═══════════════════ -->
<header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 md:px-6 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold tracking-tight">Audience Graph</h1>
      <p class="text-slate-300 text-sm mt-0.5">Targeting Blueprint Generator</p>
    </div>
    <div class="flex items-center gap-3">
      <select id="template-select" onchange="loadExample(this.value)" class="bg-slate-700/60 text-sm text-slate-200 rounded-lg px-3 py-2 border border-slate-600 focus:border-blue-400 focus:outline-none">
        <option value="">Load Example...</option>
      </select>
      <a href="atlas-segments.html" class="text-xs text-slate-400 hover:text-white transition-colors">Atlas &rarr;</a>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 md:px-6 py-6 space-y-6">

<!-- ═══════════════════ B. AUDIENCE DEFINITION ═══════════════════ -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
  <h2 class="text-lg font-bold text-gray-900 mb-4">Define Audience</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Audience Name</label>
      <input id="audience-name" type="text" placeholder="e.g. Young Affluent Women Who Ski" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-100" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <input id="audience-desc" type="text" placeholder="Brief description of the target audience" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-100" />
    </div>
  </div>

  <!-- Selected attributes summary -->
  <div id="selected-summary" class="flex flex-wrap gap-2 mb-4 min-h-[32px]"></div>

  <!-- Attribute class sections -->
  <div id="attribute-picker" class="space-y-1"></div>

  <div class="mt-6 flex items-center gap-3 flex-wrap">
    <button id="btn-generate" onclick="generateBlueprint()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-semibold shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
      Generate Blueprint
    </button>
    <button onclick="clearAll()" class="px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-sm font-medium border border-gray-200">
      Clear All
    </button>
    <span id="attr-count" class="text-sm text-gray-400 ml-2"></span>
  </div>
</div>

<!-- ═══════════════════ C. SCORING MATRIX ═══════════════════ -->
<div id="matrix-card" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold text-gray-900">Scoring Matrix</h2>
    <div class="flex gap-2">
      <span class="inline-flex items-center gap-1 text-xs text-gray-500"><span class="w-3 h-3 rounded bg-emerald-100 border border-emerald-300 inline-block"></span> W &ge; 15</span>
      <span class="inline-flex items-center gap-1 text-xs text-gray-500"><span class="w-3 h-3 rounded bg-amber-100 border border-amber-300 inline-block"></span> W &ge; 8</span>
      <span class="inline-flex items-center gap-1 text-xs text-gray-500"><span class="w-3 h-3 rounded bg-gray-100 border border-gray-200 inline-block"></span> W &lt; 8</span>
    </div>
  </div>
  <p class="text-xs text-gray-400 mb-3">Click any P or S value to edit (0–5). W = P &times; S updates in real time.</p>
  <div class="overflow-x-auto">
    <table id="scoring-table" class="w-full text-sm"></table>
  </div>
</div>

<!-- ═══════════════════ D. BLUEPRINT OUTPUT ═══════════════════ -->
<div id="blueprint-card" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in">
  <h2 class="text-lg font-bold text-gray-900 mb-4">Targeting Blueprint</h2>
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Priority bars -->
    <div class="lg:col-span-2">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Mechanism Priority Ranking</h3>
      <div id="priority-bars" class="space-y-3"></div>
    </div>
    <!-- Donut chart -->
    <div>
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Budget Allocation</h3>
      <canvas id="donut-chart" width="280" height="280"></canvas>
    </div>
  </div>

  <!-- Recommendation cards -->
  <h3 class="text-sm font-semibold text-gray-700 mt-6 mb-3">Mechanism Recommendations</h3>
  <div id="recommendation-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

  <div class="mt-5 flex gap-3 flex-wrap">
    <button onclick="exportBlueprintJSON()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-xs font-medium border border-gray-200">Export JSON</button>
    <button onclick="exportBlueprintCSV()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-xs font-medium border border-gray-200">Export CSV</button>
  </div>
</div>

<!-- ═══════════════════ E. VISUAL GRAPH ═══════════════════ -->
<div id="graph-card" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold text-gray-900">Audience Graph</h2>
    <button onclick="exportGraphPNG()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors text-xs font-medium border border-gray-200">Export PNG</button>
  </div>
  <div id="cy" class="border border-gray-200 rounded-lg bg-gray-50"></div>
</div>

<!-- ═══════════════════ F. DRILL-DOWN PANEL ═══════════════════ -->
<div id="drilldown-panel" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-6 fade-in relative drilldown-panel">
  <button onclick="closeDrillDown()" class="drilldown-close px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 text-xs font-medium">&times; Close</button>
  <div id="drilldown-header" class="mb-4"></div>
  <div id="drilldown-content"></div>
</div>

</main>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let selectedAttributes = [];   // [{classKey, attrKey}]
let scoreOverrides = {};       // {"DEMO.age_18_24.M_GEO.P": 3}
let currentBlueprint = null;
let donutChart = null;
let cyInstance = null;

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderAttributePicker();
  populateTemplateDropdown();
});

function populateTemplateDropdown() {
  const sel = document.getElementById('template-select');
  Object.values(EXAMPLE_AUDIENCES).forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex.key;
    opt.textContent = ex.label;
    sel.appendChild(opt);
  });
}

/* ═══════════════════════════════════════════════════════════════
   SCORE ACCESS (with overrides)
   ═══════════════════════════════════════════════════════════════ */
function getScore(classKey, attrKey, mechKey, dim) {
  const overrideKey = `${classKey}.${attrKey}.${mechKey}.${dim}`;
  if (overrideKey in scoreOverrides) return scoreOverrides[overrideKey];

  const cls = ATTRIBUTE_CLASSES[classKey];
  const attr = cls.attributes[attrKey];
  if (attr.scores && attr.scores[mechKey] && attr.scores[mechKey][dim] !== undefined) {
    return attr.scores[mechKey][dim];
  }
  if (cls.defaults && cls.defaults[mechKey] && cls.defaults[mechKey][dim] !== undefined) {
    return cls.defaults[mechKey][dim];
  }
  return 0;
}

/* ═══════════════════════════════════════════════════════════════
   CORE: computeBlueprint
   ═══════════════════════════════════════════════════════════════ */
function computeBlueprint() {
  if (selectedAttributes.length === 0) return null;

  const mechTotals = {};
  MECHANISM_KEYS.forEach(mk => { mechTotals[mk] = 0; });

  // per-attribute, per-mechanism W
  const rows = selectedAttributes.map(({classKey, attrKey}) => {
    const cells = {};
    MECHANISM_KEYS.forEach(mk => {
      const p = getScore(classKey, attrKey, mk, 'P');
      const s = getScore(classKey, attrKey, mk, 'S');
      const w = p * s;
      cells[mk] = { P: p, S: s, W: w };
      mechTotals[mk] += w;
    });
    return { classKey, attrKey, cells };
  });

  // Total weight across all mechanisms
  const grandTotal = Object.values(mechTotals).reduce((a, b) => a + b, 0);

  // Ranked mechanisms with % allocation
  const ranked = MECHANISM_KEYS
    .map(mk => ({
      key: mk,
      totalW: mechTotals[mk],
      pct: grandTotal > 0 ? Math.round((mechTotals[mk] / grandTotal) * 100) : 0
    }))
    .sort((a, b) => b.totalW - a.totalW);

  // Adjust rounding so percentages sum to 100
  const pctSum = ranked.reduce((a, r) => a + r.pct, 0);
  if (pctSum !== 100 && grandTotal > 0) {
    ranked[0].pct += (100 - pctSum);
  }

  return { rows, mechTotals, grandTotal, ranked };
}

/* ═══════════════════════════════════════════════════════════════
   ATTRIBUTE PICKER
   ═══════════════════════════════════════════════════════════════ */
function renderAttributePicker() {
  const container = document.getElementById('attribute-picker');
  container.innerHTML = '';

  Object.entries(ATTRIBUTE_CLASSES).forEach(([classKey, cls]) => {
    const details = document.createElement('details');
    details.className = 'border border-gray-100 rounded-lg';

    const summary = document.createElement('summary');
    summary.className = 'cursor-pointer px-4 py-3 text-sm font-semibold text-gray-800 hover:bg-gray-50 transition-colors flex items-center gap-2';
    summary.innerHTML = `<span>${cls.icon}</span> ${cls.label} <span class="text-xs text-gray-400 font-normal ml-1">${Object.keys(cls.attributes).length} attributes</span>
      <span class="selected-count-${classKey} text-xs font-medium text-blue-600 ml-auto"></span>`;
    details.appendChild(summary);

    const pillBox = document.createElement('div');
    pillBox.className = 'px-4 pb-3 flex flex-wrap gap-2';

    Object.entries(cls.attributes).forEach(([attrKey, attr]) => {
      const btn = document.createElement('button');
      btn.className = 'pill px-3 py-1.5 rounded-full text-xs font-medium border border-gray-200 bg-white text-gray-600 hover:border-blue-400 hover:text-blue-600';
      btn.textContent = attr.label;
      btn.dataset.classKey = classKey;
      btn.dataset.attrKey = attrKey;
      btn.onclick = () => toggleAttribute(classKey, attrKey, btn);
      pillBox.appendChild(btn);
    });

    details.appendChild(pillBox);
    container.appendChild(details);
  });
}

function toggleAttribute(classKey, attrKey, btn) {
  const idx = selectedAttributes.findIndex(a => a.classKey === classKey && a.attrKey === attrKey);
  if (idx >= 0) {
    selectedAttributes.splice(idx, 1);
    btn.classList.remove('active', 'border-blue-500', 'bg-blue-50', 'text-blue-700', 'border-2');
    btn.classList.add('border-gray-200', 'bg-white', 'text-gray-600');
  } else {
    selectedAttributes.push({ classKey, attrKey });
    btn.classList.add('active', 'border-blue-500', 'bg-blue-50', 'text-blue-700', 'border-2');
    btn.classList.remove('border-gray-200', 'bg-white', 'text-gray-600');
  }
  updateSummary();
  if (currentBlueprint) generateBlueprint();
}

function updateSummary() {
  // Tags
  const summaryDiv = document.getElementById('selected-summary');
  summaryDiv.innerHTML = '';
  selectedAttributes.forEach(({classKey, attrKey}) => {
    const cls = ATTRIBUTE_CLASSES[classKey];
    const attr = cls.attributes[attrKey];
    const tag = document.createElement('span');
    tag.className = 'tag inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium text-white cursor-pointer';
    tag.style.background = cls.color;
    tag.innerHTML = `${attr.label} <span class="opacity-70">&times;</span>`;
    tag.onclick = () => {
      // find and click the pill to deselect
      const pill = document.querySelector(`button[data-class-key="${classKey}"][data-attr-key="${attrKey}"]`);
      if (pill) pill.click();
    };
    summaryDiv.appendChild(tag);
  });

  // Count
  document.getElementById('attr-count').textContent = selectedAttributes.length > 0
    ? `${selectedAttributes.length} attribute${selectedAttributes.length > 1 ? 's' : ''} selected`
    : '';

  // Per-class counts
  Object.keys(ATTRIBUTE_CLASSES).forEach(ck => {
    const count = selectedAttributes.filter(a => a.classKey === ck).length;
    const el = document.querySelector(`.selected-count-${ck}`);
    if (el) el.textContent = count > 0 ? `${count} selected` : '';
  });
}

/* ═══════════════════════════════════════════════════════════════
   GENERATE BLUEPRINT
   ═══════════════════════════════════════════════════════════════ */
function generateBlueprint() {
  if (selectedAttributes.length === 0) return;

  currentBlueprint = computeBlueprint();

  renderScoringMatrix(currentBlueprint);
  renderBlueprint(currentBlueprint);
  renderGraph(currentBlueprint);

  document.getElementById('matrix-card').classList.remove('hidden');
  document.getElementById('blueprint-card').classList.remove('hidden');
  document.getElementById('graph-card').classList.remove('hidden');
}

/* ═══════════════════════════════════════════════════════════════
   SCORING MATRIX
   ═══════════════════════════════════════════════════════════════ */
function renderScoringMatrix(bp) {
  const table = document.getElementById('scoring-table');
  table.innerHTML = '';

  // Header
  const thead = document.createElement('thead');
  let headerRow = '<tr><th class="text-left py-2 px-2 text-xs text-gray-500 font-semibold">Attribute</th>';
  MECHANISM_KEYS.forEach(mk => {
    const m = MECHANISMS[mk];
    headerRow += `<th class="text-center py-2 px-1 text-xs font-semibold" style="color:${m.color}" title="${m.label}">
      <div>${m.icon}</div><div class="text-[10px]">${m.short}</div>
      <div class="text-[9px] text-gray-400 font-normal">P &middot; S &middot; W</div>
    </th>`;
  });
  headerRow += '</tr>';
  thead.innerHTML = headerRow;
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  bp.rows.forEach(row => {
    const cls = ATTRIBUTE_CLASSES[row.classKey];
    const attr = cls.attributes[row.attrKey];
    let tr = `<tr class="border-t border-gray-50">
      <td class="py-2 px-2 text-xs font-medium text-gray-800">
        <span class="inline-block w-2 h-2 rounded-full mr-1.5" style="background:${cls.color}"></span>${attr.label}
      </td>`;

    MECHANISM_KEYS.forEach(mk => {
      const c = row.cells[mk];
      const bg = c.W >= 15 ? 'bg-emerald-50 border-emerald-200' : c.W >= 8 ? 'bg-amber-50 border-amber-200' : 'bg-gray-50 border-gray-100';
      tr += `<td class="py-1 px-1 text-center">
        <div class="inline-flex items-center gap-0.5 rounded border ${bg} px-1.5 py-0.5">
          <input type="number" min="0" max="5" value="${c.P}"
            class="matrix-input" title="Precision"
            onchange="onScoreEdit('${row.classKey}','${row.attrKey}','${mk}','P',this.value)" />
          <span class="text-gray-300 text-[10px]">&middot;</span>
          <input type="number" min="0" max="5" value="${c.S}"
            class="matrix-input" title="Scale"
            onchange="onScoreEdit('${row.classKey}','${row.attrKey}','${mk}','S',this.value)" />
          <span class="text-gray-300 text-[10px]">&middot;</span>
          <span class="text-xs font-bold ${c.W >= 15 ? 'text-emerald-700' : c.W >= 8 ? 'text-amber-700' : 'text-gray-500'}">${c.W}</span>
        </div>
      </td>`;
    });

    tr += '</tr>';
    tbody.innerHTML += tr;
  });

  // Totals row
  let totalsRow = '<tr class="border-t-2 border-gray-200 bg-gray-50 font-semibold"><td class="py-2 px-2 text-xs text-gray-600">Column Total</td>';
  MECHANISM_KEYS.forEach(mk => {
    const total = bp.mechTotals[mk];
    totalsRow += `<td class="py-2 px-1 text-center text-xs" style="color:${MECHANISMS[mk].color}">${total}</td>`;
  });
  totalsRow += '</tr>';
  tbody.innerHTML += totalsRow;

  table.appendChild(tbody);
}

function onScoreEdit(classKey, attrKey, mechKey, dim, val) {
  const v = Math.max(0, Math.min(5, parseInt(val) || 0));
  scoreOverrides[`${classKey}.${attrKey}.${mechKey}.${dim}`] = v;
  generateBlueprint();
}

/* ═══════════════════════════════════════════════════════════════
   BLUEPRINT OUTPUT
   ═══════════════════════════════════════════════════════════════ */
function renderBlueprint(bp) {
  // Priority bars
  const barsDiv = document.getElementById('priority-bars');
  barsDiv.innerHTML = '';
  const maxW = bp.ranked[0]?.totalW || 1;

  bp.ranked.forEach(r => {
    const m = MECHANISMS[r.key];
    const barWidth = Math.max(2, (r.totalW / maxW) * 100);
    const level = r.pct >= 15 ? 'high' : r.pct >= 8 ? 'mid' : 'low';
    const isGeo = r.key === 'M_GEO';

    barsDiv.innerHTML += `
      <div class="flex items-center gap-3">
        <div class="w-28 flex-shrink-0 text-right">
          <span class="text-sm font-medium" style="color:${m.color}">${m.icon} ${m.short}</span>
        </div>
        <div class="flex-1 bg-gray-100 rounded-full h-6 relative overflow-hidden">
          <div class="bar-fill h-full rounded-full flex items-center justify-end pr-2" style="width:${barWidth}%; background:${m.color}">
            <span class="text-xs font-bold text-white">${r.pct}%</span>
          </div>
        </div>
        <div class="w-16 text-xs text-gray-500 text-right">W=${r.totalW}</div>
      </div>`;
  });

  // Donut chart
  renderDonutChart(bp);

  // Recommendation cards
  const cardsDiv = document.getElementById('recommendation-cards');
  cardsDiv.innerHTML = '';

  bp.ranked.forEach(r => {
    const m = MECHANISMS[r.key];
    const level = r.pct >= 15 ? 'high' : r.pct >= 8 ? 'mid' : 'low';
    const rec = MECHANISM_RECOMMENDATIONS[r.key]?.[level] || '';
    const isGeo = r.key === 'M_GEO';
    const borderColor = level === 'high' ? m.color : level === 'mid' ? '#d1d5db' : '#e5e7eb';

    let actionBtn = '';
    if (isGeo) {
      const link = buildAtlasLink(selectedAttributes);
      actionBtn = `<a href="${link}" target="_blank" class="inline-flex items-center gap-1.5 mt-3 px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-medium hover:bg-blue-700 transition-colors">
        Drill Down in Atlas &rarr;
      </a>`;
    } else {
      actionBtn = `<button onclick="openDrillDown('${r.key}')" class="inline-flex items-center gap-1.5 mt-3 px-3 py-1.5 text-white rounded-lg text-xs font-medium hover:brightness-110 transition-all" style="background:${m.color}">
        Drill Down &rarr;
      </button>`;
    }

    cardsDiv.innerHTML += `
      <div class="border rounded-lg p-4" style="border-color:${borderColor}">
        <div class="flex items-center justify-between mb-2">
          <span class="font-semibold text-sm" style="color:${m.color}">${m.icon} ${m.label}</span>
          <span class="text-sm font-bold" style="color:${m.color}">${r.pct}%</span>
        </div>
        <p class="text-xs text-gray-600 leading-relaxed">${rec}</p>
        ${actionBtn}
      </div>`;
  });
}

function renderDonutChart(bp) {
  const ctx = document.getElementById('donut-chart').getContext('2d');

  if (donutChart) donutChart.destroy();

  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: bp.ranked.map(r => MECHANISMS[r.key].short),
      datasets: [{
        data: bp.ranked.map(r => r.pct),
        backgroundColor: bp.ranked.map(r => MECHANISMS[r.key].color),
        borderWidth: 2,
        borderColor: '#ffffff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '55%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 11 }, padding: 12, usePointStyle: true, pointStyleWidth: 8 }
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.label}: ${ctx.parsed}% allocation`
          }
        }
      }
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   CYTOSCAPE GRAPH
   ═══════════════════════════════════════════════════════════════ */
function renderGraph(bp) {
  const container = document.getElementById('cy');

  const nodes = [];
  const edges = [];

  // Audience node (center-top)
  const audienceName = document.getElementById('audience-name').value || 'Audience';
  nodes.push({
    data: { id: 'audience', label: audienceName, type: 'audience' },
    classes: 'audience'
  });

  // Mechanism nodes
  MECHANISM_KEYS.forEach(mk => {
    const m = MECHANISMS[mk];
    nodes.push({
      data: { id: mk, label: `${m.icon} ${m.short}`, type: 'mechanism', color: m.color },
      classes: 'mechanism'
    });
  });

  // Attribute nodes + edges
  bp.rows.forEach(row => {
    const cls = ATTRIBUTE_CLASSES[row.classKey];
    const attr = cls.attributes[row.attrKey];
    const nodeId = `${row.classKey}.${row.attrKey}`;

    nodes.push({
      data: { id: nodeId, label: attr.label, type: 'attribute', color: cls.color, classLabel: cls.label },
      classes: 'attribute'
    });

    // Audience → attribute
    edges.push({
      data: { source: 'audience', target: nodeId, weight: 2 }
    });

    // Attribute → mechanisms
    MECHANISM_KEYS.forEach(mk => {
      const w = row.cells[mk].W;
      if (w > 0) {
        edges.push({
          data: {
            source: nodeId, target: mk, weight: w,
            P: row.cells[mk].P, S: row.cells[mk].S, W: w
          }
        });
      }
    });
  });

  if (cyInstance) cyInstance.destroy();

  cyInstance = cytoscape({
    container,
    elements: { nodes, edges },
    style: [
      {
        selector: 'node.audience',
        style: {
          'background-color': '#1e293b',
          'label': 'data(label)',
          'color': '#1e293b',
          'font-size': '13px',
          'font-weight': 'bold',
          'text-valign': 'bottom',
          'text-margin-y': 8,
          'width': 50,
          'height': 50,
          'border-width': 3,
          'border-color': '#3b82f6'
        }
      },
      {
        selector: 'node.attribute',
        style: {
          'background-color': 'data(color)',
          'label': 'data(label)',
          'color': '#374151',
          'font-size': '10px',
          'text-valign': 'bottom',
          'text-margin-y': 6,
          'width': 30,
          'height': 30,
          'border-width': 2,
          'border-color': '#ffffff'
        }
      },
      {
        selector: 'node.mechanism',
        style: {
          'background-color': 'data(color)',
          'label': 'data(label)',
          'color': '#374151',
          'font-size': '10px',
          'text-valign': 'bottom',
          'text-margin-y': 6,
          'width': 36,
          'height': 36,
          'shape': 'round-rectangle',
          'border-width': 2,
          'border-color': '#ffffff'
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 'mapData(weight, 0, 25, 0.5, 6)',
          'line-color': '#cbd5e1',
          'target-arrow-color': '#94a3b8',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'opacity': 0.6
        }
      },
      {
        selector: 'edge:hover',
        style: { 'opacity': 1 }
      }
    ],
    layout: {
      name: 'concentric',
      concentric: node => {
        if (node.data('type') === 'audience') return 3;
        if (node.data('type') === 'attribute') return 2;
        return 1;
      },
      levelWidth: () => 1,
      minNodeSpacing: 40,
      animate: false
    },
    userZoomingEnabled: true,
    userPanningEnabled: true,
    boxSelectionEnabled: false
  });

  // Tooltips on hover
  cyInstance.on('mouseover', 'edge', evt => {
    const d = evt.target.data();
    if (d.P !== undefined) {
      evt.target.style('opacity', 1);
      evt.target.style('line-color', '#3b82f6');
    }
  });
  cyInstance.on('mouseout', 'edge', evt => {
    evt.target.style('opacity', 0.6);
    evt.target.style('line-color', '#cbd5e1');
  });

  // Tip popover (simple title approach)
  cyInstance.on('mouseover', 'edge', evt => {
    const d = evt.target.data();
    if (d.P !== undefined) {
      container.title = `P=${d.P} × S=${d.S} = W=${d.W}`;
    }
  });
  cyInstance.on('mouseout', 'edge', () => { container.title = ''; });
}

    'DEMO.age_35_44': { key: 'age', val: 'mid_career' },

    'DEMO.age_55_64': { key: 'age', val: 'pre_retirement' },
    'DEMO.age_65_plus': { key: 'age', val: 'retirement' },
    'SOCIO.income_low': { key: 'income', val: 'low' },
    'SOCIO.income_mid': { key: 'income', val: 'mid' },
    'SOCIO.income_high': { key: 'income', val: 'high' },
    'SOCIO.education_degree': { key: 'education', val: 'level_4_plus' },
    'SOCIO.education_vocational': { key: 'education', val: 'level_1_3' },
    'SOCIO.education_none': { key: 'education', val: 'none' },
    'SOCIO.homeowner': { key: 'housing', val: 'owner' },
    'SOCIO.renter': { key: 'housing', val: 'renter' },
    'GEO.urban': { key: 'density', val: 'urban' },

function loadExample(key) {
  if (!key) return;
  const ex = EXAMPLE_AUDIENCES[key];
  if (!ex) return;

  clearAll();

  document.getElementById('audience-name').value = ex.label;
  document.getElementById('audience-desc').value = ex.description;

  ex.attributes.forEach(({classKey, attrKey}) => {
    selectedAttributes.push({ classKey, attrKey });
    // Open the parent details element and activate the pill
    const pill = document.querySelector(`button[data-class-key="${classKey}"][data-attr-key="${attrKey}"]`);
    if (pill) {
      pill.closest('details')?.setAttribute('open', '');
      pill.classList.add('active', 'border-blue-500', 'bg-blue-50', 'text-blue-700', 'border-2');
      pill.classList.remove('border-gray-200', 'bg-white', 'text-gray-600');
    }
  });

  updateSummary();
  generateBlueprint();
  document.getElementById('template-select').value = '';
}

   CLEAR
   ═══════════════════════════════════════════════════════════════ */
function clearAll() {
  selectedAttributes = [];
  scoreOverrides = {};
  currentBlueprint = null;
  closeDrillDown();

  document.getElementById('audience-name').value = '';
  document.getElementById('audience-desc').value = '';
  document.getElementById('template-select').value = '';

  // Reset all pills
  document.querySelectorAll('.pill.active').forEach(btn => {

    btn.classList.add('border-gray-200', 'bg-white', 'text-gray-600');
  });

  updateSummary();

  document.getElementById('matrix-card').classList.add('hidden');
  document.getElementById('blueprint-card').classList.add('hidden');
  document.getElementById('graph-card').classList.add('hidden');

}

/* ═══════════════════════════════════════════════════════════════
   EXPORT
   ═══════════════════════════════════════════════════════════════ */
function exportBlueprintJSON() {
  if (!currentBlueprint) return;
  const data = {
    audience: {
      name: document.getElementById('audience-name').value,
      description: document.getElementById('audience-desc').value,
      attributes: selectedAttributes.map(a => ({
        class: a.classKey,
        attribute: a.attrKey,
        label: ATTRIBUTE_CLASSES[a.classKey].attributes[a.attrKey].label
      }))
    },
    blueprint: currentBlueprint.ranked.map(r => ({
      mechanism: r.key,
      label: MECHANISMS[r.key].label,
      totalWeight: r.totalW,
      allocation: r.pct + '%'
    })),
    matrix: currentBlueprint.rows.map(row => {
      const entry = { class: row.classKey, attribute: row.attrKey };
      MECHANISM_KEYS.forEach(mk => {
        entry[mk] = row.cells[mk];
      });
      return entry;
    }),
    overrides: Object.keys(scoreOverrides).length > 0 ? scoreOverrides : undefined
  };

  downloadFile(JSON.stringify(data, null, 2), 'audience-blueprint.json', 'application/json');
}

function exportBlueprintCSV() {
  if (!currentBlueprint) return;
  let csv = 'Attribute,Class,' + MECHANISM_KEYS.map(mk => `${MECHANISMS[mk].short} P,${MECHANISMS[mk].short} S,${MECHANISMS[mk].short} W`).join(',') + '\n';

  currentBlueprint.rows.forEach(row => {
    const cls = ATTRIBUTE_CLASSES[row.classKey];
    const attr = cls.attributes[row.attrKey];
    let line = `"${attr.label}","${cls.label}"`;
    MECHANISM_KEYS.forEach(mk => {
      const c = row.cells[mk];
      line += `,${c.P},${c.S},${c.W}`;
    });
    csv += line + '\n';
  });

  // Totals
  csv += '"TOTAL",""';
  MECHANISM_KEYS.forEach(mk => {
    csv += `,,,${currentBlueprint.mechTotals[mk]}`;
  });
  csv += '\n';

  downloadFile(csv, 'audience-blueprint.csv', 'text/csv');
}

function exportGraphPNG() {
  if (!cyInstance) return;
  const png = cyInstance.png({ output: 'blob', bg: '#ffffff', scale: 2 });
  const url = URL.createObjectURL(png);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'audience-graph.png';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════════════════════════
   DRILL-DOWN INFRASTRUCTURE
   ═══════════════════════════════════════════════════════════════ */
let drillDownCharts = [];

function openDrillDown(mechKey) {
  closeDrillDown();
  const panel = document.getElementById('drilldown-panel');
  const header = document.getElementById('drilldown-header');
  const content = document.getElementById('drilldown-content');
  const m = MECHANISMS[mechKey];
  const r = currentBlueprint?.ranked.find(x => x.key === mechKey);

  header.innerHTML = `<h2 class="text-lg font-bold" style="color:${m.color}">${m.icon} ${m.label} — Drill Down</h2>
    <p class="text-sm text-gray-500 mt-1">Allocation: ${r ? r.pct + '%' : '—'} | Attributes: ${selectedAttributes.length}</p>`;

  content.innerHTML = '';

  const renderers = {
    M_CHAN: renderChannelDrillDown,
    M_KEY: renderKeywordDrillDown,
    M_TIME: renderTemporalDrillDown,
    M_INT: renderInterestDrillDown,
    M_CTX: renderContextualDrillDown,
    M_CRM: renderCRMDrillDown,
    M_LAL: renderLookalikeDrillDown
  };

  if (renderers[mechKey]) renderers[mechKey](content);
  else content.innerHTML = '<p class="text-gray-400 text-sm">Drill-down not yet available for this mechanism.</p>';

  panel.classList.remove('hidden');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeDrillDown() {
  drillDownCharts.forEach(c => c.destroy());
  drillDownCharts = [];
  const panel = document.getElementById('drilldown-panel');
  panel.classList.add('hidden');
  document.getElementById('drilldown-content').innerHTML = '';
}

/* ═══════════════════════════════════════════════════════════════
   M-CHAN: Channel / Media Drill-Down
   ═══════════════════════════════════════════════════════════════ */
function getWeightedAffinities() {
  const totals = {};
  CHANNEL_PLATFORM_KEYS.forEach(pk => { totals[pk] = 0; });
  let count = 0;
  selectedAttributes.forEach(({classKey, attrKey}) => {
    const key = `${classKey}.${attrKey}`;
    const aff = CHANNEL_AFFINITY[key];
    if (aff) {
      CHANNEL_PLATFORM_KEYS.forEach(pk => { totals[pk] += (aff[pk] || 0); });
      count++;
    }
  });
  if (count > 0) CHANNEL_PLATFORM_KEYS.forEach(pk => { totals[pk] = Math.round(totals[pk] / count); });
  return totals;
}

function renderChannelDrillDown(container) {
  const affinities = getWeightedAffinities();
  const ranked = CHANNEL_PLATFORM_KEYS
    .map(pk => ({ key: pk, ...CHANNEL_PLATFORMS[pk], affinity: affinities[pk] }))
    .sort((a, b) => b.affinity - a.affinity);

  // A. Platform Affinity Ranking
  let barsHtml = '<div class="mb-8"><h3 class="text-sm font-semibold text-gray-700 mb-3">Platform Affinity Ranking</h3><div class="space-y-2">';
  const maxAff = ranked[0]?.affinity || 1;
  ranked.forEach(p => {
    const w = Math.max(4, (p.affinity / maxAff) * 100);
    barsHtml += `<div class="flex items-center gap-3">
      <div class="w-32 text-right text-xs font-medium text-gray-700">${p.label}</div>
      <div class="flex-1 bg-gray-100 rounded h-7 relative overflow-hidden">
        <div class="affinity-bar flex items-center justify-end pr-2" style="width:${w}%;background:${p.color}">
          <span class="text-xs font-bold text-white">${p.affinity}</span>
        </div>
      </div>
      <div class="w-20 text-xs text-gray-500">${p.reach}M reach</div>
      <div class="w-16 text-xs text-gray-500">£${p.cpm} CPM</div>
    </div>`;
  });
  barsHtml += '</div></div>';

  // B. Big TV vs CTV comparison
  const linearKeys = ['itv_linear', 'channel4_linear', 'sky_linear'];
  const ctvKeys = ['youtube_ctv', 'itvx', 'c4_streaming'];
  const linearAff = Math.round(linearKeys.reduce((s, k) => s + affinities[k], 0) / linearKeys.length);
  const ctvAff = Math.round(ctvKeys.reduce((s, k) => s + affinities[k], 0) / ctvKeys.length);
  const linearCpm = Math.round(linearKeys.reduce((s, k) => s + CHANNEL_PLATFORMS[k].cpm, 0) / linearKeys.length);
  const ctvCpm = Math.round(ctvKeys.reduce((s, k) => s + CHANNEL_PLATFORMS[k].cpm, 0) / ctvKeys.length);
  const skew = ctvAff > linearAff ? 'CTV/BVOD' : 'Linear TV';
  const shiftPct = Math.abs(ctvAff - linearAff);

  let compHtml = `<div class="mb-8"><h3 class="text-sm font-semibold text-gray-700 mb-3">Linear TV vs CTV/BVOD Comparison</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="border rounded-lg p-4 text-center">
        <div class="text-xs text-gray-500 mb-1">Linear TV</div>
        <div class="text-2xl font-bold text-gray-800">${linearAff}</div>
        <div class="text-xs text-gray-400">avg affinity</div>
        <div class="text-sm font-semibold text-gray-600 mt-2">~£${linearCpm} CPM</div>
      </div>
      <div class="border rounded-lg p-4 text-center">
        <div class="text-xs text-gray-500 mb-1">CTV / BVOD</div>
        <div class="text-2xl font-bold text-gray-800">${ctvAff}</div>
        <div class="text-xs text-gray-400">avg affinity</div>
        <div class="text-sm font-semibold text-gray-600 mt-2">~£${ctvCpm} CPM</div>
      </div>
      <div class="border-2 rounded-lg p-4 text-center" style="border-color:#7c3aed">
        <div class="text-xs text-gray-500 mb-1">Verdict</div>
        <div class="text-sm font-semibold text-gray-800 mt-1">This audience skews <strong>${skew}</strong></div>
        <div class="text-xs text-gray-500 mt-1">Consider shifting ~${shiftPct}% budget to ${skew}</div>
      </div>
    </div>
  </div>`;

  // C. CPM Efficiency Scatter
  let scatterHtml = `<div class="mb-8"><h3 class="text-sm font-semibold text-gray-700 mb-3">CPM Efficiency — Affinity vs Cost</h3>
    <p class="text-xs text-gray-400 mb-2">Bottom-right = best value (high affinity, low CPM)</p>
    <canvas id="cpm-scatter" class="scatter-canvas" width="600" height="340"></canvas>
  </div>`;

  // D. Media Owner Cards
  const owners = {};
  ranked.forEach(p => {
    if (!owners[p.owner]) owners[p.owner] = [];
    owners[p.owner].push(p);
  });
  let ownerHtml = '<div class="mb-4"><h3 class="text-sm font-semibold text-gray-700 mb-3">By Media Owner</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4">';
  Object.entries(owners).forEach(([owner, platforms]) => {
    const avgAff = Math.round(platforms.reduce((s, p) => s + p.affinity, 0) / platforms.length);
    ownerHtml += `<div class="border rounded-lg p-4">
      <div class="font-semibold text-sm text-gray-800 mb-2">${owner}</div>
      <div class="text-xs text-gray-500 mb-2">Avg affinity: <strong>${avgAff}</strong></div>
      ${platforms.map(p => `<div class="flex items-center justify-between text-xs py-1 border-t border-gray-50">
        <span class="font-medium">${p.label}</span>
        <span class="text-gray-500">${p.type} · £${p.cpm} · ${p.affinity}</span>
      </div>`).join('')}
    </div>`;
  });
  ownerHtml += '</div></div>';

  container.innerHTML = barsHtml + compHtml + scatterHtml + ownerHtml;

  // Render scatter chart
  const scatterCtx = document.getElementById('cpm-scatter').getContext('2d');
  const scatterChart = new Chart(scatterCtx, {
    type: 'scatter',
    data: {
      datasets: ranked.map(p => ({
        label: p.label,
        data: [{ x: p.affinity, y: p.cpm }],
        backgroundColor: p.color,
        pointRadius: 10,
        pointHoverRadius: 13
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { title: { display: true, text: 'Affinity Score' }, min: 0, max: 100 },
        y: { title: { display: true, text: 'CPM (£)' }, min: 0 }
      },
      plugins: {
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: Affinity ${ctx.parsed.x}, £${ctx.parsed.y} CPM` } },
        legend: { display: false }
      }
    }
  });
  drillDownCharts.push(scatterChart);
}

/* ═══════════════════════════════════════════════════════════════
   M-KEY: Keyword Drill-Down
   ═══════════════════════════════════════════════════════════════ */
function gatherKeywords() {
  const allGroups = [];
  selectedAttributes.forEach(({classKey, attrKey}) => {
    const key = `${classKey}.${attrKey}`;
    const clusters = KEYWORD_CLUSTERS[key];
    if (clusters) {
      clusters.forEach(g => {
        allGroups.push({ ...g, source: ATTRIBUTE_CLASSES[classKey].attributes[attrKey].label });
      });
    } else if (KEYWORD_CLASS_DEFAULTS[classKey]) {
      KEYWORD_CLASS_DEFAULTS[classKey].forEach(g => {
        allGroups.push({ ...g, source: ATTRIBUTE_CLASSES[classKey].attributes[attrKey].label });
      });
    }
  });
  return allGroups;
}

function renderKeywordDrillDown(container) {
  const groups = gatherKeywords();
  if (groups.length === 0) {
    container.innerHTML = '<p class="text-gray-400 text-sm">No keyword data for selected attributes.</p>';
    return;
  }

  // Flatten for table
  let allKws = [];
  groups.forEach(g => {
    g.keywords.forEach(kw => {
      allKws.push({ ...kw, group: g.group, source: g.source });
    });
  });

  // A. Cluster Grid
  const totalVolByGroup = {};
  groups.forEach(g => {
    const key = g.group;
    if (!totalVolByGroup[key]) totalVolByGroup[key] = { volume: 0, avgComp: 0, count: 0 };
    g.keywords.forEach(kw => {
      totalVolByGroup[key].volume += kw.volume;
      totalVolByGroup[key].avgComp += kw.competition;
      totalVolByGroup[key].count++;
    });
  });
  Object.values(totalVolByGroup).forEach(v => { v.avgComp = v.avgComp / v.count; });

  const maxVol = Math.max(...Object.values(totalVolByGroup).map(v => v.volume));
  let gridHtml = '<div class="mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-3">Keyword Clusters</h3><div class="flex flex-wrap gap-3">';
  Object.entries(totalVolByGroup).forEach(([name, data]) => {
    const size = Math.max(80, (data.volume / maxVol) * 180);
    const comp = data.avgComp;
    const bg = comp < 0.4 ? '#dcfce7' : comp < 0.7 ? '#fef9c3' : '#fee2e2';
    const border = comp < 0.4 ? '#86efac' : comp < 0.7 ? '#fde047' : '#fca5a5';
    gridHtml += `<div class="kw-cluster-block" style="background:${bg};border:2px solid ${border};min-width:${size}px" onclick="filterKwTable('${name.replace(/'/g, "\\'")}')">
      <div class="text-xs font-semibold text-gray-800">${name}</div>
      <div class="text-xs text-gray-500 mt-1">${(data.volume/1000).toFixed(0)}k vol</div>
    </div>`;
  });
  gridHtml += '</div></div>';

  // B. Keyword Table
  const maxKwVol = Math.max(...allKws.map(k => k.volume));
  let tableHtml = `<div class="mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-3">All Keywords</h3>
    <div class="overflow-x-auto"><table class="kw-table w-full text-sm" id="kw-table">
    <thead><tr class="border-b border-gray-200">
      <th class="text-left py-2 px-2 text-xs text-gray-500" onclick="sortKwTable('term')">Keyword</th>
      <th class="text-left py-2 px-2 text-xs text-gray-500" onclick="sortKwTable('volume')">Volume</th>
      <th class="text-left py-2 px-2 text-xs text-gray-500" onclick="sortKwTable('cpc')">CPC £</th>
      <th class="text-left py-2 px-2 text-xs text-gray-500" onclick="sortKwTable('competition')">Competition</th>
      <th class="text-left py-2 px-2 text-xs text-gray-500">Group</th>
      <th class="text-left py-2 px-2 text-xs text-gray-500">Source</th>
    </tr></thead><tbody id="kw-tbody">`;
  allKws.sort((a, b) => b.volume - a.volume);

function filterKwTable(groupName) {
  document.querySelectorAll('.kw-row').forEach(row => {
    if (groupName === '_all' || row.dataset.group === groupName) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
}

function sortKwTable(key) {
  if (!window._kwData) return;
  if (window._kwSortKey === key) window._kwSortAsc = !window._kwSortAsc;
  else { window._kwSortKey = key; window._kwSortAsc = key === 'term'; }

  const sorted = [...window._kwData].sort((a, b) => {
    const va = a[key], vb = b[key];
    if (typeof va === 'string') return window._kwSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return window._kwSortAsc ? va - vb : vb - va;
  });

  const maxKwVol = Math.max(...sorted.map(k => k.volume));
  const tbody = document.getElementById('kw-tbody');
  tbody.innerHTML = '';
  sorted.forEach(kw => {
    const barW = Math.max(4, (kw.volume / maxKwVol) * 100);
    const compColor = kw.competition < 0.4 ? '#22c55e' : kw.competition < 0.7 ? '#eab308' : '#ef4444';
    tbody.innerHTML += `<tr class="border-t border-gray-50 kw-row" data-group="${kw.group}">
      <td class="py-1.5 px-2 text-xs font-medium text-gray-800">${kw.term}</td>
      <td class="py-1.5 px-2"><div class="flex items-center gap-2"><div class="bg-gray-100 rounded h-3 w-20 overflow-hidden"><div class="h-full rounded" style="width:${barW}%;background:#0891b2"></div></div><span class="text-xs text-gray-600">${(kw.volume/1000).toFixed(1)}k</span></div></td>
      <td class="py-1.5 px-2 text-xs text-gray-700">£${kw.cpc.toFixed(2)}</td>
      <td class="py-1.5 px-2"><span class="inline-block w-2.5 h-2.5 rounded-full mr-1" style="background:${compColor}"></span><span class="text-xs text-gray-600">${kw.competition.toFixed(2)}</span></td>
      <td class="py-1.5 px-2 text-xs text-gray-500">${kw.group}</td>
      <td class="py-1.5 px-2 text-xs text-gray-400">${kw.source}</td>
    </tr>`;
  });
}

function exportKeywordCSV() {
  if (!window._kwData) return;
  let csv = 'Keyword,Volume,CPC,Competition,Group,Source\n';
  window._kwData.forEach(kw => {
    csv += `"${kw.term}",${kw.volume},${kw.cpc.toFixed(2)},${kw.competition.toFixed(2)},"${kw.group}","${kw.source}"\n`;
  });
  downloadFile(csv, 'audience-keywords.csv', 'text/csv');
}

/* ═══════════════════════════════════════════════════════════════
   M-TIME: Temporal Drill-Down
   ═══════════════════════════════════════════════════════════════ */
function getCompositeHourly() {
  const composite = new Array(24).fill(0);
  const compositeDow = new Array(7).fill(0);
  let count = 0;
  selectedAttributes.forEach(({classKey, attrKey}) => {
    const key = `${classKey}.${attrKey}`;
    const profile = DAYPART_PROFILES[key];
    if (profile) {
      profile.hourly.forEach((v, i) => { composite[i] += v; });
      if (profile.dow) profile.dow.forEach((v, i) => { compositeDow[i] += v; });
      count++;
    }
  });
  if (count > 0) {
    composite.forEach((v, i) => { composite[i] = Math.round(v / count); });
    compositeDow.forEach((v, i) => { compositeDow[i] = Math.round(v / count); });
  }
  return { hourly: composite, dow: compositeDow };
}

function renderTemporalDrillDown(container) {
  const { hourly, dow } = getCompositeHourly();

  // A. 24-Hour Curve
  let chartHtml = `<div class="mb-8"><h3 class="text-sm font-semibold text-gray-700 mb-3">24-Hour Engagement Curve</h3>
    <p class="text-xs text-gray-400 mb-2">Index: 100 = average. Above 100 = higher engagement.</p>
    <canvas id="hourly-chart" width="700" height="300"></canvas>
  </div>`;

  // B. Daypart Cards
  let dpHtml = '<div class="mb-8"><h3 class="text-sm font-semibold text-gray-700 mb-3">Daypart Performance</h3><div class="grid grid-cols-2 md:grid-cols-5 gap-3">';
  Object.entries(DAYPART_LABELS).forEach(([key, dp]) => {
    const avg = Math.round(dp.hours.reduce((s, h) => s + hourly[h], 0) / dp.hours.length);
    const bg = avg >= 130 ? '#dcfce7' : avg >= 110 ? '#fef9c3' : avg >= 90 ? '#f3f4f6' : '#fee2e2';
    const label = avg >= 130 ? 'Peak' : avg >= 110 ? 'Strong' : avg >= 90 ? 'Average' : 'Weak';
    dpHtml += `<div class="daypart-card" style="background:${bg}">
      <div class="text-xs font-semibold text-gray-700">${dp.label}</div>
      <div class="text-2xl font-bold text-gray-800 mt-1">${avg}</div>
      <div class="text-xs text-gray-500 mt-1">${label}</div>
    </div>`;
  });
  dpHtml += '</div></div>';

  // C. Day-of-Week Strip
  let dowHtml = '<div class="mb-4"><h3 class="text-sm font-semibold text-gray-700 mb-3">Day-of-Week Engagement</h3><div class="grid grid-cols-7 gap-2">';
  const maxDow = Math.max(...dow);
  const minDow = Math.min(...dow);
  DAY_OF_WEEK_LABELS.forEach((label, i) => {
    const val = dow[i];
    const intensity = maxDow > minDow ? (val - minDow) / (maxDow - minDow) : 0.5;
    const r = Math.round(34 + (1 - intensity) * 200);
    const g = Math.round(197 - intensity * 50);
    const b = Math.round(94 + (1 - intensity) * 100);
    const bg = val >= 110 ? '#dcfce7' : val >= 100 ? '#f0fdf4' : val >= 90 ? '#f3f4f6' : '#fee2e2';
    dowHtml += `<div class="dow-block" style="background:${bg}">
      <div class="text-gray-500">${label}</div>
      <div class="font-bold text-gray-800 mt-1">${val}</div>
    </div>`;
  });
  dowHtml += '</div></div>';

  container.innerHTML = chartHtml + dpHtml + dowHtml;

  // Render hourly chart
  const ctx = document.getElementById('hourly-chart').getContext('2d');
  const peakZones = [];
  hourly.forEach((v, i) => { if (v >= 120) peakZones.push(i); });

  const bgColors = hourly.map(v => v >= 130 ? 'rgba(34,197,94,0.3)' : v >= 110 ? 'rgba(234,179,8,0.15)' : 'rgba(148,163,184,0.1)');

  const hourlyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length: 24}, (_, i) => `${String(i).padStart(2, '0')}:00`),
      datasets: [
        {
          label: 'Engagement Index',
          data: hourly,
          borderColor: '#ca8a04',
          backgroundColor: 'rgba(202,138,4,0.15)',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointBackgroundColor: hourly.map(v => v >= 130 ? '#22c55e' : v >= 110 ? '#eab308' : '#94a3b8')
        },
        {
          label: 'Baseline (100)',
          data: new Array(24).fill(100),
          borderColor: '#d1d5db',
          borderDash: [5, 5],
          borderWidth: 1,
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { title: { display: true, text: 'Index (100=avg)' }, min: 0 },
        x: { title: { display: true, text: 'Hour of Day' } }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label === 'Baseline (100)' ? '' : `Index: ${ctx.parsed.y}` } }

  drillDownCharts.push(hourlyChart);
}

function renderLookalikeDrillDown(container) {
  const hasCRM = selectedAttributes.some(a => a.classKey === 'PURCH' || a.classKey === 'BEHAV');
  const hasDemo = selectedAttributes.some(a => a.classKey === 'DEMO');

  const platforms = [
    { name: 'Meta Lookalikes', score: hasCRM ? 88 : 55, seedReq: 'Customer list or pixel data', minSeed: '1,000 users', expansion: '1%–10%' },
    { name: 'Google Similar Audiences', score: hasCRM ? 82 : 50, seedReq: 'Customer Match list or GA audience', minSeed: '1,000 users', expansion: 'Auto' },

    { name: 'TikTok LAL', score: hasCRM ? 72 : 40, seedReq: 'Pixel or customer file', minSeed: '1,000 users', expansion: 'Narrow / Broad' },
    { name: 'Amazon DSP', score: selectedAttributes.some(a => a.attrKey.includes('buyer') || a.attrKey.includes('fmcg')) ? 80 : 42, seedReq: 'Purchase or browse data', minSeed: 'ASINs or audience', expansion: 'Category-based' }
  ];

  platforms.sort((a, b) => b.score - a.score);

  // Overlap risk
  const overlapRisks = [];
  if (platforms[0].score > 70 && platforms[1].score > 70) {
    overlapRisks.push({ pair: `${platforms[0].name} + ${platforms[1].name}`, risk: 'High', note: 'Both platforms strong — implement frequency caps and exclude overlapping audiences' });
  }
  if (platforms.filter(p => p.score > 60).length >= 3) {
    overlapRisks.push({ pair: 'Multi-platform LAL', risk: 'Medium', note: 'Multiple strong platforms — use sequential testing, not simultaneous launch' });
  }

  let html = '<h3 class="text-sm font-semibold text-gray-700 mb-3">Platform Suitability for Lookalike Modelling</h3><div class="space-y-3 mb-6">';
  platforms.forEach(p => {
    const barW = Math.max(4, p.score);
    const color = p.score >= 70 ? '#4f46e5' : p.score >= 50 ? '#94a3b8' : '#d1d5db';
    html += `<div class="flex items-center gap-3">
      <div class="w-44 text-right text-xs font-medium text-gray-700">${p.name}</div>
      <div class="flex-1 bg-gray-100 rounded h-7 relative overflow-hidden">
        <div class="h-full rounded flex items-center justify-end pr-2" style="width:${barW}%;background:${color}">
          <span class="text-xs font-bold text-white">${p.score}</span>
        </div>
      </div>
      <div class="w-32 text-xs text-gray-500">Min: ${p.minSeed}</div>
    </div>`;
  });
  html += '</div>';

  if (overlapRisks.length > 0) {
    html += '<h3 class="text-sm font-semibold text-gray-700 mb-3">Overlap Risk Flags</h3><div class="space-y-2 mb-4">';
    overlapRisks.forEach(r => {
      const bg = r.risk === 'High' ? '#fee2e2' : '#fef9c3';
      html += `<div class="border rounded-lg p-3" style="background:${bg}">
        <div class="text-xs font-semibold text-gray-800">${r.risk} Risk: ${r.pair}</div>
        <div class="text-xs text-gray-600 mt-1">${r.note}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Platform details table
  html += '<h3 class="text-sm font-semibold text-gray-700 mb-3">Platform Requirements</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-200"><th class="text-left py-2 px-2 text-xs text-gray-500">Platform</th><th class="text-left py-2 px-2 text-xs text-gray-500">Seed Requirement</th><th class="text-left py-2 px-2 text-xs text-gray-500">Min Seed</th><th class="text-left py-2 px-2 text-xs text-gray-500">Expansion</th></tr></thead><tbody>';
  platforms.forEach(p => {
    html += `<tr class="border-t border-gray-50"><td class="py-1.5 px-2 text-xs font-medium">${p.name}</td><td class="py-1.5 px-2 text-xs text-gray-600">${p.seedReq}</td><td class="py-1.5 px-2 text-xs text-gray-600">${p.minSeed}</td><td class="py-1.5 px-2 text-xs text-gray-600">${p.expansion}</td></tr>`;
  });
  html += '</tbody></table></div>';

  container.innerHTML = html;
}
</script>
</body>
</html>
